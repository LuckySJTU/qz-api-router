# API Router Configuration

# Local proxy server
proxy:
  host: 0.0.0.0
  port: 8600

# HTTP proxy for outgoing requests to backends (all 4 share the same proxy)
# Set to empty string or remove to disable
# Examples: http://127.0.0.1:7890  socks5://127.0.0.1:1080
http_proxy: http://127.0.0.1:7890

# Shared API key for all backends
api_key: sk-your-api-key-here

# Backend API endpoints (same model, different deployments)
backends:
  - name: api-1
    url: https://api1.example.com
  - name: api-2
    url: https://api2.example.com
  - name: api-3
    url: https://api3.example.com
  - name: api-4
    url: https://api4.example.com

# Health check settings
health_check:
  interval: 5           # seconds between health checks
  timeout: 3            # seconds for health check request timeout
  failure_threshold: 3  # consecutive failures to mark unavailable
  recovery_threshold: 2 # consecutive successes to mark available again

# Request settings
request:
  timeout: 120          # total request timeout in seconds (adjustable for debugging)
  connect_timeout: 10   # TCP + TLS handshake timeout in seconds
  max_retries: 2        # max retries on different backends
  retry_delay: 0.3      # seconds to wait before each retry

# Connection pool settings
connection_pool:
  limit: 200            # total concurrent connections across all hosts
  limit_per_host: 50    # max connections per backend host
  keepalive_timeout: 30 # seconds to keep idle connections alive

# TUI dashboard
tui:
  refresh_interval: 1   # seconds between TUI refresh
